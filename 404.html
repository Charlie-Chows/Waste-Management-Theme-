<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoWaste | Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f1de;
            color: #1b4332;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .icon {
            font-size: 6rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #2b9348, #e9c46a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: #1b4332;
        }

        p {
            font-size: 1.2rem;
            color: #2d6a4f;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 700;
            text-decoration: none;
            background: #2b9348;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(43, 147, 72, 0.3);
        }

        .btn:hover {
            background: #1b7a3a;
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(43, 147, 72, 0.4);
        }

        @media (max-width: 480px) {
            .icon {
                font-size: 4rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">
            <i class="fas fa-trash-alt"></i>
        </div>
        <h1>404</h1>
        <p>Oops! That page seems to have been recycled or never existed.<br>Let's get you back on track.</p>
        <a href="index.html" class="btn">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Back to Home
        </a>
    </div>

    <!-- Font Awesome for icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"
        crossorigin="anonymous"></script>
</body>

</html>
